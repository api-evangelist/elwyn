name: Elwyn
description: |-
  Elwyn is a Pennsylvania-headquartered nonprofit human services organization founded
  in 1852, providing services to children and adults with intellectual and developmental
  disabilities, autism, and behavioral health needs. Elwyn describes itself as "the
  longest-running human services nonprofit of its kind in the nation," operating across
  Pennsylvania, Delaware, New Jersey, and California with approximately 4,000 employees.
  The organization delivers six core service lines: Adult Behavioral Health Services,
  Children's Behavioral Health Services, Crisis Services, Early Learning Services,
  Educational Services, and Intellectual and Developmental Disabilities Services.

  Elwyn is a service-delivery nonprofit, not a software or API provider. It publishes
  no public APIs, OpenAPI documents, SDKs, developer portal, or open-data feeds. Its
  digital presence is limited to its marketing site (elwyn.org), program pages, news,
  and donation/contact forms. This profile documents the organization's mission and
  the absence of any public API or developer surface.
